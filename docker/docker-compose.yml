version: "3.8"

volumes:
  carcosa-volume:
  character-volume:
  summon-volume:
  caddy-data:
  caddy-config:

services:
  caddy:
    image: caddy:latest
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
      - carcosa-volume:/srv/carcosa
      - character-volume:/srv/character
      - summon-volume:/srv/summon
    depends_on:
      - funkaoshi-randomcharacter
      - funkaoshi-lotfp-summon
      - funkaoshi-randomcarcosa

  funkaoshi-randomcharacter:
    image: funkaoshi/randomcharacter:latest
    volumes:
      - character-volume:/app/static
    restart: unless-stopped

  funkaoshi-lotfp-summon:
    image: funkaoshi/lotfp-summon:latest
    volumes:
      - summon-volume:/app/static
    restart: unless-stopped

  funkaoshi-randomcarcosa:
    image: funkaoshi/randomcarcosa:latest
    volumes:
      - carcosa-volume:/app/static
    restart: unless-stopped

  linkding:
    image: sissbruecker/linkding:latest
    volumes:
      - "${LD_HOST_DATA_DIR:-./data}:/etc/linkding/data"
    env_file:
      - .env-linkding
    restart: unless-stopped
